name: Add or update endpoint resource
description: Submit a public endpoint/resource candidate for monitoring and registry review.
title: "endpoint: "
labels:
  - endpoint-submission
  - metagraphed-under-review
body:
  - type: markdown
    attributes:
      value: |
        Submit one public endpoint/resource candidate at a time. Accepted submissions create candidates for review and probing; contributors cannot directly set uptime, latency, status, or pool eligibility.
  - type: input
    id: netuid
    attributes:
      label: Netuid
      description: Use 0 for Bittensor base-layer RPC/WSS/archive endpoints.
      placeholder: "0"
    validations:
      required: true
  - type: dropdown
    id: layer
    attributes:
      label: Endpoint layer
      options:
        - bittensor-base
        - subnet-app
        - data-provider
        - docs-provider
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Endpoint kind
      options:
        - subtensor-rpc
        - subtensor-wss
        - archive
        - subnet-api
        - openapi
        - sse
        - data-artifact
        - dashboard
        - source-repo
        - docs
        - website
        - sdk
        - example
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Public URL
      description: The exact public URL to list, probe, or monitor.
      placeholder: https://example.com/api
    validations:
      required: true
  - type: input
    id: source_url
    attributes:
      label: Source URL
      description: Public docs, repository, status page, or announcement supporting the endpoint claim.
      placeholder: https://docs.example.com/api
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Provider or operator slug
      description: Existing provider slug if known. Unknown providers are routed to review.
      placeholder: example-operator
    validations:
      required: true
  - type: dropdown
    id: auth_required
    attributes:
      label: Does this endpoint require authentication?
      options:
        - "no"
        - "yes"
        - "unknown"
    validations:
      required: true
  - type: textarea
    id: rate_limits
    attributes:
      label: Public rate limits or access notes
      description: Include public rate limits, API-key requirements, archive claims, or known access constraints. Do not include credentials.
  - type: checkboxes
    id: public_safety
    attributes:
      label: Public-safety confirmation
      options:
        - label: This endpoint is publicly reachable and safe for read-only probes.
          required: true
        - label: This submission does not include secrets, wallet/PAT data, private URLs, credentialed dashboards, or write-flow examples.
          required: true
        - label: I understand observed health, latency, uptime, and pool eligibility are probe-derived only.
          required: true
